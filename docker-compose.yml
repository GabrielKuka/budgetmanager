services:
  backend:
    build:
      context: ./backend
    container_name: budgetmanager_backend
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.budget-backend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.budget-backend.entrypoints=budget-backend"
      - "traefik.http.services.budget-backend.loadbalancer.server.port=8001"
    volumes:
      - /home/user1/budgetmanager/budgetdb:/app/budgetdb
    networks:
      - budget_network
      - proxy

  frontend:
    build:
      context: ./frontend
    container_name: budgetmanager_frontend
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.budget-frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.budget-frontend.entrypoints=budget-frontend"
      - "traefik.http.services.budget-frontend.loadbalancer.server.port=3001"
    networks:
      - budget_network
      - proxy

volumes:
  budgetdb:

networks:
  budget_network:
    driver: bridge
  proxy:
    external: true
